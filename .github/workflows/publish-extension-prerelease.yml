name: Publish extension (pre-release)

# Publishes a PRE-RELEASE build of the VS Code extension to the Marketplace
# (and Open VSX). This is the preview / dogfood channel: users opt in with the
# "Switch to Pre-Release Version" button on the extension page and receive these
# builds via auto-update, while stable users are unaffected.
#
# Manual only (workflow_dispatch) — click "Run workflow" (or `gh workflow run
# publish-extension-prerelease.yml`) whenever you want to cut a preview from the
# current default branch. The stable pipeline (publish-extension.yml, tag-driven)
# is intentionally left untouched, so a preview never risks the stable release.
#
# Versioning follows the VS Code convention: pre-releases use an ODD minor
# (0.9.x) and stable uses an EVEN minor (0.8.x → next 0.10.0). The patch is the
# workflow run number, so each preview auto-increments (0.9.1, 0.9.2, …) with no
# version churn on the default branch — main's package.json stays on the stable
# line. Bump `base_version` when the stable minor advances (keep it one odd
# minor ahead of stable).
#
# Reuses the protected `release` environment and its VSCE_PAT / OVSX_PAT, so each
# preview still passes the same approval gate. To make previews one-click, create
# an ungated `preview` environment with its own VSCE_PAT and switch `environment`
# below. The MCP npm package is NOT published here (previews are extension-only).

on:
  workflow_dispatch:
    inputs:
      base_version:
        description: "Pre-release version base (odd minor, one ahead of stable)"
        required: true
        default: "0.9"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
      PRERELEASE_VERSION: ${{ inputs.base_version }}.${{ github.run_number }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - run: npm ci
      - name: Build + package the pre-release VSIX
        run: |
          npm run build
          npm run build:mcp
          npx @vscode/vsce package --pre-release --no-git-tag-version \
            --allow-missing-repository "$PRERELEASE_VERSION" -o extension.vsix
      - name: Publish pre-release to VS Code Marketplace
        run: npx @vscode/vsce publish --pre-release --packagePath extension.vsix
      - name: Publish pre-release to Open VSX (skipped if OVSX_PAT is not set)
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish extension.vsix --pre-release --pat "$OVSX_PAT"
