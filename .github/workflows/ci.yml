name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run check
      - name: Build
        run: node esbuild.mjs
      - name: Unit tests (layout + geometry + parser + hooks + fuzz)
        run: npm run test:unit

  mcp-package:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build standalone MCP npm package
        run: npm run build:mcp:pkg
      - name: Smoke test (initialize / tools/list / tools/call over stdio)
        run: node scripts/smoke-mcp.mjs

  grammar-coverage:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Network-dependent: if the clone fails the harness finds no corpus,
      # prints SKIP and exits 0, so this job never blocks on outages.
      - name: Clone the OMG corpus (shallow)
        run: node scripts/clone-corpus.mjs || echo "clone failed — coverage will be skipped"
      - name: Grammar coverage regression guard (parse errors vs baseline)
        run: npm run coverage:grammar -- --check

  webview-e2e:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Webview E2E (Playwright, adversarial interactions)
        run: npm run test:e2e

  vscode-integration:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node esbuild.mjs
      - name: Integration tests (VS Code extension host)
        run: xvfb-run -a npm run test:vscode

  vscode-ui:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: UI E2E (vscode-extension-tester, real VS Code window)
        run: xvfb-run -a npm run test:ui
