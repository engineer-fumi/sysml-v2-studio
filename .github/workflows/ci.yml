name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run check
      - name: Build
        run: node esbuild.mjs
      - name: Unit tests (layout + geometry + parser + hooks + fuzz)
        run: npm run test:unit

  webview-e2e:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Webview E2E (Playwright, adversarial interactions)
        run: npm run test:e2e

  vscode-integration:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node esbuild.mjs
      - name: Integration tests (VS Code extension host)
        run: xvfb-run -a npm run test:vscode

  vscode-ui:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: UI E2E (vscode-extension-tester, real VS Code window)
        run: xvfb-run -a npm run test:ui
