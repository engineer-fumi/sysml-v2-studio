name: Publish MCP package

# Publishes @engineer-fumi/sysml-v2-mcp to npm using OIDC Trusted Publishing —
# no long-lived npm token is stored. Trusted publishing requires the npm package
# to already exist and a trusted publisher to be configured on npmjs.com
# (Package settings → Trusted Publisher → GitHub Actions: repo
# engineer-fumi/sysml-v2-studio, workflow publish-mcp.yml). The first publish was
# done manually with a short-lived token; this workflow handles every release
# after that.
#
# Trigger: push a `v*` tag (the same tag that releases the extension — see
# publish-extension.yml) or run manually. The version actually published is
# whatever is in package.json (build-mcp-package.mjs syncs it), so bump the
# version, then tag `v<version>`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v6
      # Pinned to match npm's official trusted-publishing example. The publish
      # actually started working once the trusted publisher was saved on npmjs.com
      # (it had silently failed to save while 2FA was unconfigured), so the OIDC
      # token exchange was being rejected and npm fell back to an empty token (404).
      - uses: actions/setup-node@v6
        with:
          # Trusted publishing requires Node >= 22.14.0 (and npm >= 11.5.1)
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm ci
      - name: Build MCP package + smoke test
        run: |
          npm run build:mcp:pkg
          node scripts/smoke-mcp.mjs
      - name: Publish to npm (Trusted Publishing / OIDC)
        # No NODE_AUTH_TOKEN: npm detects the GitHub OIDC environment and uses it,
        # and auto-generates a provenance attestation.
        run: npm publish ./dist/npm --access public
